# =============================================================================
# Memory Pipeline Configuration
# Externalized memory pipeline settings for the Cognitive Agent.
# Loaded by app.core.config at startup.
# =============================================================================

# ── Token Budgets ────────────────────────────────────────────────────────────
# Maximum context tokens allocated to each memory source when building the
# system prompt. The context_builder respects these limits per-source.
token_budgets:
  stm: 3000          # Short-Term Memory (recent conversation turns)
  ltm_episodic: 800  # Long-Term Memory - episodic summaries from Qdrant
  ltm_facts: 400     # Long-Term Memory - student facts from knowledge_nodes
  user_profile: 300  # User concept mastery profile (struggles/strengths)
  max_context_tokens: 6000

# ── Decay Rates ──────────────────────────────────────────────────────────────
# Time-based exponential decay (half-life in days) for recency scoring.
decay_rates:
  half_life_days: 10.0

# ── Consolidation Pipeline ───────────────────────────────────────────────────
consolidation:
  turn_interval: 5          # Run consolidation every N turns
  min_importance_score: 0.7 # Heuristic importance threshold for deep extraction
