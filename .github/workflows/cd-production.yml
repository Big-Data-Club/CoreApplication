name: CD - Deploy Production (Self-Hosted K8s Rollout)

on:
  workflow_run:
    workflows: ["CI - Build, Test & Push"]
    types: [completed]
    branches: [main, develop]

  workflow_dispatch:
    inputs:
      target_service:
        description: 'Target service deployment to restart (e.g. auth-service, lms-service, frontend, ai-service, chat-service, lab-service, personalize-service, or "all")'
        required: false
        default: 'all'

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: 🚀 Rollout Kubernetes Deployments
    runs-on: [self-hosted, linux]
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Selective Kubernetes Rollout
        run: |
          echo "🚀 Executing Kubernetes Rollout Restart on Self-Hosted Runner..."
          
          # Detect kubectl / k3s command wrapper
          if command -v kubectl &> /dev/null; then
            KUBECTL="kubectl"
          elif command -v k3s &> /dev/null; then
            KUBECTL="sudo k3s kubectl"
          else
            KUBECTL="sudo kubectl"
          fi
          
          TARGET="${{ github.event.inputs.target_service || 'all' }}"
          
          restart_deployment() {
            local DEP=$1
            echo "🔄 Triggering rollout restart for deployment/${DEP}..."
            ${KUBECTL} rollout restart deployment/${DEP} || echo "⚠️ Warning: Failed to restart ${DEP}"
            echo "⏳ Waiting for deployment/${DEP} status..."
            ${KUBECTL} rollout status deployment/${DEP} --timeout=180s || echo "⚠️ Timeout waiting for ${DEP}"
          }

          if [ "${TARGET}" != "all" ]; then
            restart_deployment "${TARGET}"
          else
            echo "🔄 Rolling out all active Kubernetes deployments..."
            for dep in auth-service frontend lms-service ai-service ai-worker chat-service lab-service personalize-service; do
              if ${KUBECTL} get deployment ${dep} &> /dev/null; then
                restart_deployment "${dep}"
              fi
            done
          fi

      - name: Health Check & Pod Status
        run: |
          echo "⏳ Checking Pod status post-rollout..."
          if command -v kubectl &> /dev/null; then
            KUBECTL="kubectl"
          elif command -v k3s &> /dev/null; then
            KUBECTL="sudo k3s kubectl"
          else
            KUBECTL="sudo kubectl"
          fi
          ${KUBECTL} get pods -o wide || true

      - name: Cleanup Old Docker Images & K8s Revisions
        if: always()
        run: |
          echo "🧹 Cleaning up unused Docker images & containerd cache..."
          if command -v docker &> /dev/null; then
            sudo docker image prune -af --filter "until=24h" || docker image prune -f || true
          fi
          if command -v k3s &> /dev/null; then
            sudo k3s crictl rmi --prune || true
          fi
          echo "✅ Cleanup complete!"

      - name: Deployment Summary
        if: always()
        run: |
          STATUS="${{ job.status }}"
          [[ "$STATUS" == "success" ]] && ICON="✅" || ICON="❌"
          cat >> $GITHUB_STEP_SUMMARY << EOF
          ## ${ICON} Self-Hosted Kubernetes Deployment ${STATUS}
          | | |
          |---|---|
          | **Runner** | Self-Hosted Linux Runner |
          | **Target** | \`${{ github.event.inputs.target_service || 'all' }}\` |
          | **Commit** | \`${{ github.sha }}\` |
          | **Time** | $(date '+%Y-%m-%d %H:%M:%S %Z') |
          EOF