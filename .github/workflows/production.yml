name: Build and deploy production

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: Existing immutable image tag to deploy (defaults to this commit SHA)
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: production
  cancel-in-progress: false

env:
  REGISTRY_NAMESPACE: ${{ secrets.DOCKERHUB_USERNAME }}

jobs:
  build:
    name: Build ${{ matrix.image }}
    if: github.event_name == 'push' || inputs.image_tag == ''
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: bdc-backend
            context: auth-and-management-service
          - image: bdc-lms
            context: lms-service
          - image: bdc-lab
            context: lab-service
          - image: bdc-chat
            context: chat-service
          - image: bdc-ai
            context: ai-service
          - image: bdc-personalize
            context: personalize-service
          - image: bdc-frontend
            context: frontend

    steps:
      - name: Check out CoreApplication
        uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 1

      - name: Read frontend submodule revision
        if: matrix.context == 'frontend'
        id: frontend-ref
        shell: bash
        run: echo "sha=$(git ls-tree HEAD frontend | awk '{print $3}')" >> "$GITHUB_OUTPUT"

      - name: Check out frontend submodule
        if: matrix.context == 'frontend'
        uses: actions/checkout@v4
        with:
          repository: Big-Data-Club/BDCHub---Frontend
          ref: ${{ steps.frontend-ref.outputs.sha }}
          token: ${{ secrets.SUBMODULE_TOKEN }}
          path: frontend

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push immutable image
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.context }}
          file: ./${{ matrix.context }}/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.REGISTRY_NAMESPACE }}/${{ matrix.image }}:${{ github.sha }}
            ${{ env.REGISTRY_NAMESPACE }}/${{ matrix.image }}:latest
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            VERSION=${{ github.sha }}
            NEXT_PUBLIC_GOOGLE_CLIENT_ID=${{ secrets.NEXT_PUBLIC_GOOGLE_CLIENT_ID }}
            NEXT_PUBLIC_CHAT_WS_URL=${{ vars.NEXT_PUBLIC_CHAT_WS_URL }}
            NEXTAUTH_URL=${{ vars.NEXTAUTH_URL }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
          provenance: mode=max
          sbom: true

  deploy:
    name: Roll out production
    needs: build
    if: always() && (needs.build.result == 'success' || needs.build.result == 'skipped')
    runs-on: [self-hosted, linux, x64, production]
    environment: production
    permissions:
      contents: read

    steps:
      - name: Check out deployment scripts
        uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 1

      - name: Log in to Docker Hub for K3s pulls
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          DEPLOY_NAMESPACE: default
        shell: bash
        run: |
          set -euo pipefail
          kubectl create secret docker-registry dockerhub-registry \
            --namespace "$DEPLOY_NAMESPACE" \
            --docker-server=https://index.docker.io/v1/ \
            --docker-username="$DOCKERHUB_USERNAME" \
            --docker-password="$DOCKERHUB_TOKEN" \
            --dry-run=client -o yaml | kubectl apply -f -
          kubectl patch serviceaccount default --namespace "$DEPLOY_NAMESPACE" \
            --type merge -p '{"imagePullSecrets":[{"name":"dockerhub-registry"}]}'

      - name: Deploy immutable images and verify rollouts
        env:
          REGISTRY_NAMESPACE: ${{ secrets.DOCKERHUB_USERNAME }}
          IMAGE_TAG: ${{ inputs.image_tag || github.sha }}
          DEPLOY_NAMESPACE: default
          ROLLOUT_TIMEOUT: 12m
        run: ./scripts/deploy-production.sh

