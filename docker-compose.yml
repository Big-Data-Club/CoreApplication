x-common-healthcheck: &common-healthcheck
  interval: 10s
  timeout: 5s
  retries: 3
  start_period: 30s

x-common-logging: &common-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

x-ai-env: &ai-env
  APP_ENV: ${APP_ENV:-production}
  LOG_LEVEL: INFO

  # LMS PostgreSQL dependency removed - Kafka event driven
  KAFKA_BROKERS: kafka:9092

  # AI PostgreSQL
  AI_DB_HOST: postgres-ai
  AI_DB_PORT: 5432
  AI_DB_USER: ${AI_POSTGRES_USER}
  AI_DB_PASSWORD: ${AI_POSTGRES_PASSWORD}
  AI_DB_NAME: ${AI_POSTGRES_DB}

  # Qdrant vector store
  QDRANT_HOST: qdrant
  QDRANT_PORT: 6333
  QDRANT_GRPC_PORT: 6334
  QDRANT_PREFER_GRPC: "true"
  QDRANT_API_KEY: ""
  USE_QDRANT: "true"

  # Redis
  REDIS_HOST: redis-lms
  REDIS_PORT: 6379
  REDIS_PASSWORD: ${REDIS_PASSWORD}
  REDIS_DB: 1

  # MinIO
  MINIO_ENDPOINT: minio:9000
  MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
  MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
  MINIO_BUCKET: lms-files
  MINIO_USE_SSL: "false"

  # LLM
  GROQ_API_KEY: ${GROQ_API_KEY:-}
  CHAT_MODEL: ${AI_CHAT_MODEL:-llama-3.1-8b-instant}
  QUIZ_MODEL: ${AI_QUIZ_MODEL:-llama-3.3-70b-versatile}

  # Embedding / Reranker
  EMBEDDING_MODEL: ${EMBEDDING_MODEL:-BAAI/bge-m3}
  EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS:-1024}
  EMBEDDING_PREFIX_MODE: ${EMBEDDING_PREFIX_MODE:-bge}
  RERANKER_MODEL: ${RERANKER_MODEL:-BAAI/bge-reranker-v2-m3}
  USE_NATIVE_MULTILINGUAL: "true"
  OMP_NUM_THREADS: "1"
  OPENBLAS_NUM_THREADS: "1"
  MKL_NUM_THREADS: "1"
  TOKENIZERS_PARALLELISM: "false"
  SENTENCE_TRANSFORMERS_HOME: /app/.cache/models

  # RAG tuning
  CHUNK_SIZE: 500
  CHUNK_OVERLAP: 50
  TOP_K_CHUNKS: 3

  # Internal auth
  AI_SERVICE_SECRET: ${AI_SERVICE_SECRET:-ai-service-secret-change-me}
  LMS_SERVICE_URL: http://lms-service:8081
  PERSONALIZE_SERVICE_URL: ${PERSONALIZE_SERVICE_URL:-http://personalize-service:8082}

  # Neo4j Knowledge Graph
  NEO4J_URI: bolt://neo4j:7687
  NEO4J_USER: neo4j
  NEO4J_PASSWORD: ${NEO4J_PASSWORD}
  NEO4J_ENABLED: "true"
  YOUTUBE_WHISPER_FALLBACK: "true"

services:
  # ── Traefik Reverse Proxy ──────────────────────────────────────────────────
  traefik:
    image: traefik:v3.6
    container_name: bdc-traefik
    restart: unless-stopped
    command:
      - "--api.insecure=false"
      - "--ping=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=app-network"
      - "--entrypoints.web.address=:3000"
      - "--entrypoints.web.forwardedheaders.trustedips=127.0.0.1,172.28.0.0/16,172.16.0.0/12,10.0.0.0/8,192.168.0.0/16"
      - "--log.level=INFO"
      - "--accesslog=true"
      - "--accesslog.format=json"
    ports:
      - "3000:3000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging: *common-logging
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
    security_opt:
      - no-new-privileges:true
    labels:
      - "service.type=proxy"
      - "service.name=traefik"

  # ── Kafka Broker (KRaft Mode) ──────────────────────────────────────────────
  kafka:
    image: bitnamilegacy/kafka:3.7.0
    container_name: bdc-kafka
    restart: unless-stopped
    environment:
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_CFG_NUM_PARTITIONS=3
    ports:
      - "9092:9092"
    volumes:
      - kafka_data:/bitnami/kafka
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server 127.0.0.1:9092 --list"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *common-logging
    labels:
      - "service.type=message-broker"
      - "service.name=kafka"

  # Frontend: Next.js Application
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - BUILD_DATE=${BUILD_DATE:-unknown}
        - VERSION=${VERSION:-1.0.0}
        - NEXT_PUBLIC_GOOGLE_CLIENT_ID=${NEXT_PUBLIC_GOOGLE_CLIENT_ID}
        - NEXT_PUBLIC_CHAT_WS_URL=${NEXT_PUBLIC_CHAT_WS_URL:-wss://bdc.hpcc.vn/chatapiv1}
        - CHAT_API_URL=http://chat-backend:8083
        - LAB_API_URL=http://lab-backend:8082
        - LATEX_API_URL=http://latex-backend:8084
    image: ${DOCKER_USERNAME}/bdc-frontend:${IMAGE_TAG:-latest}
    container_name: nextjs-prod
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      HOSTNAME: 0.0.0.0
      BACKEND_URL: http://backend:8080
      LMS_API_URL: http://lms-backend:8081
      AI_SERVICE_URL: http://ai-service:8000
      GOOGLE_SCRIPT_URL: ${GOOGLE_SCRIPT_URL}
      YOUTUBE_CLIENT_ID: ${YOUTUBE_CLIENT_ID}
      YOUTUBE_CLIENT_SECRET: ${YOUTUBE_CLIENT_SECRET}
      YOUTUBE_REDIRECT_URI: ${YOUTUBE_REDIRECT_URI}
      NEXT_PUBLIC_YOUTUBE_UPLOAD_ENABLED: ${NEXT_PUBLIC_YOUTUBE_UPLOAD_ENABLED}
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXT_TELEMETRY_DISABLED: 1
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      AI_SERVICE_SECRET: ${AI_SERVICE_SECRET}
      CHAT_API_URL: http://chat-backend:8083
      LATEX_API_URL: http://latex-backend:8084
      NEXT_PUBLIC_CHAT_WS_URL: ${NEXT_PUBLIC_CHAT_WS_URL:-wss://bdc.hpcc.vn/chatapiv1}
    ports:
      - "${FRONTEND_PORT:-3001}:3001"
    volumes:
      - ./frontend/logs:/app/logs
      - ./frontend/data:/app/data
    depends_on:
      backend:
        condition: service_healthy
      lms-backend:
        condition: service_healthy
      chat-backend:
        condition: service_healthy
      latex-backend:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      <<: *common-healthcheck
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      start_period: 45s
    logging: *common-logging
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M
    security_opt:
      - no-new-privileges:true
    labels:
      - "service.type=frontend"
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.entrypoints=web"
      - "traefik.http.routers.frontend.rule=Host(`bdc.hpcc.vn`) || Host(`localhost`)"
      - "traefik.http.routers.frontend.priority=1"
      - "traefik.http.services.frontend.loadbalancer.server.port=3001"
      - "traefik.http.middlewares.compress-middleware.compress=true"
      - "traefik.http.routers.frontend.middlewares=compress-middleware"


  # ── Auth DB: pure PostgreSQL (no AI extensions needed) ────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: postgres-auth
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=en_US.UTF-8"
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./auth-and-management-service/init-scripts:/docker-entrypoint-initdb.d:ro
    networks:
      - app-network
    healthcheck:
      <<: *common-healthcheck
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
    logging: *common-logging
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    security_opt:
      - no-new-privileges:true
    labels:
      - "service.type=database"
      - "service.name=postgres-auth"

  # ── Auth/Management Backend ────────────────────────────────────────────────
  backend:
    build:
      context: ./auth-and-management-service
      dockerfile: Dockerfile
    image: ${DOCKER_USERNAME}/bdc-backend:${IMAGE_TAG:-latest}
    container_name: auth-service
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      LMS_API_URL: ${LMS_API_URL}
      LMS_API_SECRET: ${LMS_API_SECRET}
      AI_SERVICE_URL: ${AI_SERVICE_URL:-http://ai-service:8000}
      AI_SERVICE_SECRET: ${AI_SERVICE_SECRET}
      CHAT_API_URL: http://chat-backend:8083
      CHAT_SYNC_SECRET: ${CHAT_SYNC_SECRET}
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: ${HIKARI_MAX_POOL_SIZE:-20}
      SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE: ${HIKARI_MIN_IDLE:-5}
      SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT: 20000
      SPRING_DATASOURCE_HIKARI_IDLE_TIMEOUT: 300000
      SPRING_DATASOURCE_HIKARI_MAX_LIFETIME: 1200000
      SPRING_DATASOURCE_HIKARI_KEEPALIVE_TIME: 300000
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${JPA_DDL_AUTO:-update}
      SPRING_JPA_SHOW_SQL: false
      SPRING_JPA_PROPERTIES_HIBERNATE_FORMAT_SQL: false
      SPRING_JPA_PROPERTIES_HIBERNATE_JDBC_BATCH_SIZE: 50
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-3600000}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      CORS_ALLOWED_ORIGINS: https://bdc.hpcc.vn,http://localhost:3000,https://bdcweb.vercel.app
      LOGGING_LEVEL_ROOT: ${LOG_LEVEL:-INFO}
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: health,info,metrics,prometheus
      MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS: always
      JAVA_OPTS: >-
        -XX:+UseContainerSupport
        -XX:MaxRAMPercentage=75.0
        -XX:+UseG1GC
        -XX:MaxGCPauseMillis=200
        -Djava.security.egd=file:/dev/./urandom
      EMAIL_PASSWORD: ${EMAIL_PASSWORD}
      EMAIL: ${EMAIL}
      APP_PUBLIC_URL: ${APP_PUBLIC_URL}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      - upload_data:/app/uploads
      - ./auth-and-management-service/logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      <<: *common-healthcheck
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider",
             "http://localhost:8080/actuator/health/liveness"]
      start_period: 60s
    logging: *common-logging
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1536M
        reservations:
          cpus: '0.5'
          memory: 512M
    security_opt:
      - no-new-privileges:true
    labels:
      - "service.type=backend"
      - "service.name=auth-service"
      - "traefik.enable=true"
      - "traefik.http.routers.backend.entrypoints=web"
      - "traefik.http.routers.backend.rule=(Host(`bdc.hpcc.vn`) || Host(`localhost`)) && PathPrefix(`/apiv1`)"
      - "traefik.http.routers.backend.priority=10"
      - "traefik.http.services.backend.loadbalancer.server.port=8080"
      - "traefik.http.middlewares.strip-apiv1.stripprefix.prefixes=/apiv1"
      - "traefik.http.middlewares.backend-compress.compress=true"
      - "traefik.http.routers.backend.middlewares=strip-apiv1,backend-compress"
      - "traefik.http.routers.uploads.entrypoints=web"
      - "traefik.http.routers.uploads.rule=(Host(`bdc.hpcc.vn`) || Host(`localhost`)) && PathPrefix(`/uploads`)"
      - "traefik.http.routers.uploads.priority=10"
      - "traefik.http.routers.uploads.service=backend"
      - "traefik.http.middlewares.uploads-cache.headers.customresponseheaders.Cache-Control=public, max-age=31536000, immutable"
      - "traefik.http.routers.uploads.middlewares=uploads-cache"


  # Database: PostgreSQL (LMS Service)
  postgres-lms:
    image: postgres:15-alpine
    container_name: postgres-lms
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${LMS_POSTGRES_DB:-lms_db}
      POSTGRES_USER: ${LMS_POSTGRES_USER:-lms_user}
      POSTGRES_PASSWORD: ${LMS_POSTGRES_PASSWORD:-lms_password}
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=en_US.UTF-8"
      POSTGRES_MAX_CONNECTIONS: 100
    ports:
      - "${LMS_POSTGRES_PORT:-5434}:5432"
    volumes:
      - postgres_lms_data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      <<: *common-healthcheck
      test: ["CMD-SHELL", "pg_isready -U $${LMS_POSTGRES_USER} -d $${LMS_POSTGRES_DB}"]
    logging: *common-logging
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    security_opt:
      - no-new-privileges:true
    labels:
      - "service.type=database"
      - "service.name=postgres-lms"

  # Database: PostgreSQL (Lab Service)
  postgres-lab:
    image: postgres:15-alpine
    container_name: postgres-lab
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${LAB_POSTGRES_DB:-lab_db}
      POSTGRES_USER: ${LAB_POSTGRES_USER:-lab_user}
      POSTGRES_PASSWORD: ${LAB_POSTGRES_PASSWORD:-lab_password}
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=en_US.UTF-8"
      POSTGRES_MAX_CONNECTIONS: 100
    ports:
      - "${LAB_POSTGRES_PORT:-5436}:5432"
    volumes:
      - postgres_lab_data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      <<: *common-healthcheck
      test: ["CMD-SHELL", "pg_isready -U $${LAB_POSTGRES_USER} -d $${LAB_POSTGRES_DB}"]
    logging: *common-logging
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    security_opt:
      - no-new-privileges:true
    labels:
      - "service.type=database"
      - "service.name=postgres-lab"

  # Database: PostgreSQL (LaTeX Service)
  postgres-latex:
    image: postgres:15-alpine
    container_name: postgres-latex
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${LATEX_DB_NAME:-latexdb}
      POSTGRES_USER: ${LATEX_DB_USER:-latexuser}
      POSTGRES_PASSWORD: ${LATEX_DB_PASSWORD:-latexpass}
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=en_US.UTF-8"
      POSTGRES_MAX_CONNECTIONS: 100
    ports:
      - "${LATEX_DB_PORT:-5437}:5432"
    volumes:
      - postgres_latex_data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${LATEX_DB_USER} -d $${LATEX_DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    logging: *common-logging
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    security_opt:
      - no-new-privileges:true
    labels:
      - "service.type=database"
      - "service.name=postgres-latex"

  # Redis
  redis-lms:
    image: redis:7-alpine
    container_name: redis-lms
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
      --appendonly yes
      --appendfsync everysec
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_lms_data:/data
    networks:
      - app-network
    healthcheck:
      <<: *common-healthcheck
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
    logging: *common-logging
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
    security_opt:
      - no-new-privileges:true
    labels:
      - "service.type=cache"
      - "service.name=redis-lms"

  # LMS Backend Service: Go
  lms-backend:
    build:
      context: ./lms-service
      dockerfile: Dockerfile
      args:
        - BUILD_DATE=${BUILD_DATE:-unknown}
        - VERSION=${VERSION:-1.0.0}
    image: ${DOCKER_USERNAME}/bdc-lms:${IMAGE_TAG:-latest}
    container_name: lms-service
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_PORT: ${LMS_PORT:-8081}
      APP_NAME: "LMS Service"
      GIN_MODE: release
      LMS_SYNC_SECRET: ${LMS_SYNC_SECRET}
      DB_HOST: postgres-lms
      DB_PORT: 5432
      DB_USER: ${LMS_POSTGRES_USER}
      DB_PASSWORD: ${LMS_POSTGRES_PASSWORD}
      DB_NAME: ${LMS_POSTGRES_DB}
      DB_SSL_MODE: disable
      DB_MAX_OPEN_CONNS: 50
      DB_MAX_IDLE_CONNS: 10
      DB_CONN_MAX_LIFETIME: 5m
      DB_CONN_MAX_IDLE_TIME: 10m
      KAFKA_BROKERS: kafka:9092
      REDIS_HOST: redis-lms
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB: 0
      REDIS_POOL_SIZE: 10
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_HOURS: 1
      STORAGE_TYPE: ${STORAGE_TYPE}
      UPLOAD_MAX_SIZE: 104857600
      UPLOAD_DIR: /app/uploads
      ALLOWED_VIDEO_FORMATS: "mp4,avi,mov,mkv,webm,flv"
      ALLOWED_DOCUMENT_FORMATS: "pdf,doc,docx,ppt,pptx,xls,xlsx,txt"
      ALLOWED_IMAGE_FORMATS: "jpg,jpeg,png,gif,webp,svg"
      AUTH_SERVICE_URL: http://backend:8080
      AUTH_SERVICE_TIMEOUT: 10s
      AI_SERVICE_URL: http://ai-service:8000
      AI_SERVICE_SECRET: ${AI_SERVICE_SECRET}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      CORS_ALLOWED_METHODS: "GET,POST,PUT,DELETE,OPTIONS,PATCH"
      CORS_ALLOWED_HEADERS: "Authorization,Content-Type,Accept"
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: lms-files
      MINIO_USE_SSL: "false"
      GOMAXPROCS: 2
      GOGC: 100
    ports:
      - "${LMS_PORT:-8081}:8081"
    volumes:
      - lms_upload_data:/app/uploads
      - ./lms-service/logs:/app/logs
    depends_on:
      postgres-lms:
        condition: service_healthy
      redis-lms:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      <<: *common-healthcheck
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider",
             "http://localhost:8081/health"]
      start_period: 45s
    logging: *common-logging
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M
    security_opt:
      - no-new-privileges:true
    labels:
      - "service.type=backend"
      - "service.name=lms-service"
      - "traefik.enable=true"
      - "traefik.http.routers.lms.entrypoints=web"
      - "traefik.http.routers.lms.rule=(Host(`bdc.hpcc.vn`) || Host(`localhost`)) && PathPrefix(`/lmsapiv1`)"
      - "traefik.http.routers.lms.priority=10"
      - "traefik.http.services.lms.loadbalancer.server.port=8081"
      - "traefik.http.middlewares.rewrite-lms.replacepathregex.regex=^/lmsapiv1/(.*)"
      - "traefik.http.middlewares.rewrite-lms.replacepathregex.replacement=/api/v1/$$1"
      - "traefik.http.middlewares.lms-compress.compress=true"
      - "traefik.http.routers.lms.middlewares=rewrite-lms,lms-compress"
      - "traefik.http.routers.files.entrypoints=web"
      - "traefik.http.routers.files.rule=(Host(`bdc.hpcc.vn`) || Host(`localhost`)) && PathPrefix(`/files`)"
      - "traefik.http.routers.files.priority=10"
      - "traefik.http.middlewares.rewrite-files.replacepathregex.regex=^/files/(.*)"
      - "traefik.http.middlewares.rewrite-files.replacepathregex.replacement=/api/v1/files/serve/$$1"
      - "traefik.http.middlewares.files-cache.headers.customresponseheaders.Cache-Control=public, max-age=31536000, immutable"
      - "traefik.http.routers.files.middlewares=rewrite-files,files-cache"
      - "traefik.http.routers.files.service=lms"


  # Lab Backend Service: Go
  lab-backend:
    build:
      context: ./lab-service
      dockerfile: Dockerfile
      args:
        - BUILD_DATE=${BUILD_DATE:-unknown}
        - VERSION=${VERSION:-1.0.0}
    image: ${DOCKER_USERNAME}/bdc-lab:${IMAGE_TAG:-latest}
    container_name: lab-service
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_PORT: ${LAB_PORT:-8082}
      APP_NAME: "Lab Service"
      GIN_MODE: release
      LMS_SYNC_SECRET: ${LMS_SYNC_SECRET}
      DB_HOST: postgres-lab
      DB_PORT: 5432
      DB_USER: ${LAB_POSTGRES_USER:-lab_user}
      DB_PASSWORD: ${LAB_POSTGRES_PASSWORD:-lab_password}
      DB_NAME: ${LAB_POSTGRES_DB:-lab_db}
      DB_SSL_MODE: disable
      DB_MAX_OPEN_CONNS: 50
      DB_MAX_IDLE_CONNS: 10
      DB_CONN_MAX_LIFETIME: 5m
      DB_CONN_MAX_IDLE_TIME: 10m
      KAFKA_BROKERS: kafka:9092
      REDIS_HOST: redis-lms
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB: 2
      REDIS_POOL_SIZE: 10
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_HOURS: 1
      STORAGE_TYPE: ${STORAGE_TYPE:-minio}
      LAB_MINIO_ENDPOINT: ${LAB_MINIO_ENDPOINT:-minio:9000}
      LAB_MINIO_ACCESS_KEY: ${LAB_MINIO_ACCESS_KEY:-minioadmin}
      LAB_MINIO_SECRET_KEY: ${LAB_MINIO_SECRET_KEY:-minioadmin123}
      LAB_MINIO_BUCKET: ${LAB_MINIO_BUCKET:-lab-files}
      LAB_MINIO_USE_SSL: ${LAB_MINIO_USE_SSL:-false}
    ports:
      - "${LAB_PORT:-8082}:8082"
    depends_on:
      postgres-lab:
        condition: service_healthy
      redis-lms:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      <<: *common-healthcheck
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider",
             "http://localhost:8082/health"]
      start_period: 45s
    logging: *common-logging
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M
    security_opt:
      - no-new-privileges:true
    labels:
      - "service.type=backend"
      - "service.name=lab-service"
      - "traefik.enable=true"
      - "traefik.http.routers.lab.entrypoints=web"
      - "traefik.http.routers.lab.rule=(Host(`bdc.hpcc.vn`) || Host(`localhost`)) && PathPrefix(`/labapiv1`)"
      - "traefik.http.routers.lab.priority=10"
      - "traefik.http.services.lab.loadbalancer.server.port=8082"
      - "traefik.http.middlewares.rewrite-lab.replacepathregex.regex=^/labapiv1/(.*)"
      - "traefik.http.middlewares.rewrite-lab.replacepathregex.replacement=/api/v1/$$1"
      - "traefik.http.middlewares.lab-compress.compress=true"
      - "traefik.http.routers.lab.middlewares=rewrite-lab,lab-compress"

  # Chat Service: Go — Standalone realtime chat microservice
  chat-backend:
    build:
      context: ./chat-service
      dockerfile: Dockerfile
      args:
        - BUILD_DATE=${BUILD_DATE:-unknown}
        - VERSION=${VERSION:-1.0.0}
    image: ${DOCKER_USERNAME}/bdc-chat:${IMAGE_TAG:-latest}
    container_name: chat-service
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_PORT: ${CHAT_PORT:-8083}
      APP_NAME: "Chat Service"
      GIN_MODE: release
      DB_HOST: ${CHAT_POSTGRES_HOST}
      DB_PORT: 5432
      DB_USER: ${CHAT_POSTGRES_USER}
      DB_PASSWORD: ${CHAT_POSTGRES_PASSWORD}
      DB_NAME: ${CHAT_POSTGRES_DB}
      DB_SSL_MODE: ${CHAT_DB_SSL_MODE:-require}
      DB_MAX_OPEN_CONNS: 30
      DB_MAX_IDLE_CONNS: 5
      DB_CONN_MAX_LIFETIME: 30m
      DB_CONN_MAX_IDLE_TIME: 5m
      REDIS_HOST: redis-lms
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB: 3
      REDIS_POOL_SIZE: 100
      REDIS_MIN_IDLE_CONNS: 10
      REDIS_DIAL_TIMEOUT: 3s
      REDIS_READ_TIMEOUT: 500ms
      REDIS_WRITE_TIMEOUT: 500ms
      REDIS_POOL_TIMEOUT: 1s
      JWT_SECRET: ${JWT_SECRET}
      CHAT_SYNC_SECRET: ${CHAT_SYNC_SECRET}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      GOMAXPROCS: 2
    ports:
      - "${CHAT_PORT:-8083}:8083"
    depends_on:
      redis-lms:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      <<: *common-healthcheck
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider",
             "http://localhost:8083/health"]
      start_period: 30s
    logging: *common-logging
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    security_opt:
      - no-new-privileges:true
    labels:
      - "service.type=backend"
      - "service.name=chat-service"
      - "traefik.enable=true"
      - "traefik.http.routers.chat.entrypoints=web"
      - "traefik.http.routers.chat.rule=(Host(`bdc.hpcc.vn`) || Host(`localhost`)) && PathPrefix(`/chatapiv1`)"
      - "traefik.http.routers.chat.priority=10"
      - "traefik.http.services.chat.loadbalancer.server.port=8083"
      - "traefik.http.middlewares.rewrite-chat.replacepathregex.regex=^/chatapiv1/(.*)"
      - "traefik.http.middlewares.rewrite-chat.replacepathregex.replacement=/api/v1/$$1"
      - "traefik.http.middlewares.chat-compress.compress=true"
      - "traefik.http.routers.chat.middlewares=rewrite-chat,chat-compress"

  # LaTeX Service: Go — BDCTex compile engine
  latex-backend:
    build:
      context: ./latex-service
      dockerfile: Dockerfile
    image: ${DOCKER_USERNAME}/bdc-latex:${IMAGE_TAG:-latest}
    container_name: latex-service
    restart: unless-stopped
    env_file: .env
    environment:
      APP_ENV: ${APP_ENV:-production}
      LATEX_PORT: 8084
      LATEX_DB_HOST: postgres-latex
      LATEX_DB_PORT_INTERNAL: 5432
      LATEX_DB_USER: ${LATEX_DB_USER:-latexuser}
      LATEX_DB_PASSWORD: ${LATEX_DB_PASSWORD:-latexpass}
      LATEX_DB_NAME: ${LATEX_DB_NAME:-latexdb}
      LATEX_DB_SSLMODE: disable
      JWT_SECRET: ${JWT_SECRET}
      REDIS_HOST: redis-lms
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB: 4
      REDIS_POOL_SIZE: 50
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      LATEX_MINIO_BUCKET: ${LATEX_MINIO_BUCKET:-latex-files}
      MINIO_USE_SSL: "false"
      LATEX_WORKER_COUNT: ${LATEX_WORKER_COUNT:-8}
      LATEX_MAX_TIMEOUT: ${LATEX_MAX_TIMEOUT:-120}
      LATEX_MAX_MEMORY_MB: ${LATEX_MAX_MEMORY_MB:-512}
      STORAGE_TYPE: minio
    ports:
      - "${LATEX_PORT:-8084}:8084"
    depends_on:
      postgres-latex:
        condition: service_healthy
      redis-lms:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8084/api/v1/health"]
      start_period: 30s
      interval: 10s
      timeout: 5s
      retries: 3
    logging: *common-logging
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4096M
        reservations:
          cpus: '0.5'
          memory: 512M
    security_opt:
      - no-new-privileges:true
    labels:
      - "service.type=backend"
      - "service.name=latex-service"
      - "traefik.enable=true"
      - "traefik.http.routers.latex.entrypoints=web"
      - "traefik.http.routers.latex.rule=(Host(`bdc.hpcc.vn`) || Host(`localhost`)) && PathPrefix(`/latexapiv1`)"
      - "traefik.http.routers.latex.priority=10"
      - "traefik.http.services.latex.loadbalancer.server.port=8084"
      - "traefik.http.middlewares.rewrite-latex.replacepathregex.regex=^/latexapiv1/(.*)"
      - "traefik.http.middlewares.rewrite-latex.replacepathregex.replacement=/api/v1/$$1"
      - "traefik.http.middlewares.latex-compress.compress=true"
      - "traefik.http.routers.latex.middlewares=rewrite-latex,latex-compress"

  postgres-ai:
    image: postgres:15-alpine
    container_name: postgres-ai
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${AI_POSTGRES_DB:-ai_db}
      POSTGRES_USER: ${AI_POSTGRES_USER:-ai_user}
      POSTGRES_PASSWORD: ${AI_POSTGRES_PASSWORD:-ai_password}
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=en_US.UTF-8"
    ports:
      - "${AI_POSTGRES_PORT:-5435}:5432"
    volumes:
      - postgres_ai_data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      <<: *common-healthcheck
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
    logging: *common-logging
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    security_opt:
      - no-new-privileges:true
    labels:
      - "service.type=database"
      - "service.name=postgres-ai"

  # ── Qdrant Vector Store ────────────────────────────────────────────────────
  # Purpose-built ANN engine replacing pgvector for semantic search.
  # Collections: document_chunks (1024d) + knowledge_nodes (1024d), cosine distance.
  # gRPC port 6334 used by ai-service/ai-worker for fast batch upserts.
  # REST port 6333 used for health checks and Qdrant Web UI.
  qdrant:
    image: qdrant/qdrant:v1.13.6
    container_name: qdrant
    restart: unless-stopped
    environment:
      # Keep HNSW graph in RAM; store vectors on disk (good default for 1-8 GB datasets)
      QDRANT__STORAGE__ON_DISK_PAYLOAD: "true"
      QDRANT__SERVICE__HTTP_PORT: 6333
      QDRANT__SERVICE__GRPC_PORT: 6334
      # Enable gRPC (required for prefer_grpc=True in client)
      QDRANT__SERVICE__ENABLE_TLS: "false"
      # Telemetry off for production
      QDRANT__TELEMETRY_DISABLED: "true"
    ports:
      - "6333:6333"   # REST + Web UI
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging: *common-logging
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G     # HNSW graph in RAM; adjust to dataset size
        reservations:
          cpus: '0.5'
          memory: 512M
    labels:
      - "service.type=vector-store"
      - "service.name=qdrant"

  # AI Service: FastAPI
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    image: ${DOCKER_USERNAME}/bdc-ai:${IMAGE_TAG:-latest}
    container_name: ai-service
    restart: unless-stopped
    shm_size: '1gb'
    environment:
      <<: *ai-env
      APP_PORT: 8000
      USE_RERANKER: "true"
      RERANK_FETCH_K: ${RERANK_FETCH_K:-15}
    ports:
      - "8000:8000"
    depends_on:
      kafka:
        condition: service_healthy
      postgres-ai:
        condition: service_healthy
      redis-lms:
        condition: service_healthy
      minio:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    logging: *common-logging
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 1.5G
        reservations:
          cpus: '0.5'
          memory: 512M
    volumes:
      - ai_model_cache:/app/.cache/models
    labels:
      - "service.type=ai"
      - "service.name=ai-service"

  # AI Worker: Celery
  ai-worker:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    image: ${DOCKER_USERNAME}/bdc-ai:${IMAGE_TAG:-latest}
    restart: unless-stopped
    shm_size: '1gb'
    # concurrency=1: one model set (~900 MB) per process.
    # Scale horizontally by adding replicas, not concurrency.
    command: python -m app.worker.kafka_worker
    environment:
      <<: *ai-env
      # Worker doesn't serve user traffic → reranker disabled to save RAM
      USE_RERANKER: "false"
      REINDEX_BATCH_SIZE: ${REINDEX_BATCH_SIZE:-5}
    depends_on:
      kafka:
        condition: service_healthy
      postgres-ai:
        condition: service_healthy
      redis-lms:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    networks:
      - app-network
    logging: *common-logging
    deploy:
      resources:
        limits:
          cpus: '3.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 2G
    volumes:
      - ai_model_cache:/app/.cache/models
    labels:
      - "service.type=worker"
      - "service.name=ai-worker"

  personalize-service:
    build:
      context: ./personalize-service
      dockerfile: Dockerfile
    image: ${DOCKER_USERNAME}/bdc-personalize:${IMAGE_TAG:-latest}
    container_name: personalize-service
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-development}
      KAFKA_BROKERS: ${KAFKA_BROKERS:-kafka:9092}
      AI_SERVICE_SECRET: ${AI_SERVICE_SECRET:-ai-service-secret-change-me}
      DATA_DIR: /app/data
    ports:
      - "8085:8082"
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging: *common-logging
    volumes:
      - personalize_data:/app/data
    labels:
      - "service.type=personalize"
      - "service.name=personalize-service"

  # Object Storage
  minio:
    image: minio/minio:latest
    container_name: minio-lms
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      MINIO_BROWSER: "on"
      MINIO_PROMETHEUS_AUTH_TYPE: public
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - app-network
    healthcheck:
      <<: *common-healthcheck
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
    logging: *common-logging
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    security_opt:
      - no-new-privileges:true
    labels:
      - "service.type=storage"
      - "service.name=minio"

  # ── Neo4j Knowledge Graph ──────────────────────────────────────────────────
  # Purpose: Knowledge base linking (prerequisites, extends, equivalent, related).
  # Stores both intra-course and cross-course graph edges.
  # gRPC disabled; HTTP only for simplicity. Consider gRPC for production.
  neo4j:
    image: neo4j:5.26.24-ubi9
    container_name: neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_memory_heap_initial__size: "512m"
      NEO4J_dbms_memory_heap_max__size: "1g"
      NEO4J_dbms_memory_pagecache_size: "512m"
      NEO4J_dbms_default__listen__address: "0.0.0.0"
      NEO4J_server_bolt_listen__address: "0.0.0.0:7687"
    ports:
      - "7474:7474"   # Neo4j Browser (dev only)
      - "7687:7687"   # Bolt protocol
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      - app-network
    healthcheck:
      <<: *common-healthcheck
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:7474/browser"]
      start_period: 60s
    logging: *common-logging
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    security_opt:
      - no-new-privileges:true
    labels:
      - "service.type=database"
      - "service.name=neo4j"



# Volumes
volumes:
  postgres_data:
    driver: local
    labels:
      - "backup.enabled=true"
      - "backup.schedule=daily"
  postgres_lms_data:
    driver: local
    labels:
      - "backup.enabled=true"
      - "backup.schedule=daily"
  postgres_lab_data:
    driver: local
    labels:
      - "backup.enabled=true"
      - "backup.schedule=daily"
  postgres_latex_data:
    driver: local
    labels:
      - "backup.enabled=true"
      - "backup.schedule=daily"
  postgres_ai_data:
    driver: local
    labels:
      - "backup.enabled=true"
      - "backup.schedule=daily"
  qdrant_data:
    driver: local
    labels:
      - "backup.enabled=true"
      - "backup.schedule=daily"
  neo4j_data:
    driver: local
    labels:
      - "backup.enabled=true"
      - "backup.schedule=daily"
  neo4j_logs:
    driver: local
  redis_lms_data:
    driver: local
    labels:
      - "backup.enabled=true"
      - "backup.schedule=weekly"
  upload_data:
    driver: local
    labels:
      - "backup.enabled=true"
      - "backup.schedule=weekly"
  lms_upload_data:
    driver: local
    labels:
      - "backup.enabled=true"
      - "backup.schedule=weekly"
  minio_data:
    driver: local
    labels:
      - "backup.enabled=true"
      - "backup.schedule=daily"
  ai_model_cache:
    driver: local
  kafka_data:
    driver: local
  personalize_data:
    driver: local



# Networks
networks:
  app-network:
    name: app-network
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.28.0.0/16
          gateway: 172.28.0.1
    driver_opts:
      com.docker.network.bridge.name: br-bdc
      com.docker.network.driver.mtu: 1500
    labels:
      - "network.name=app-network"
      - "network.environment=production"