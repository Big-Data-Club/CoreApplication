apiVersion: apps/v1
kind: Deployment
metadata:
  name: lms-service
  labels:
    app: lms-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lms-service
  template:
    metadata:
      labels:
        app: lms-service
    spec:
      containers:
      - name: lms-service
        image: bdc-lms:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8081
        envFrom:
        - configMapRef:
            name: bdc-config
        env:
        # DB connection variables
        - name: DB_HOST
          value: "$(LMS_POSTGRES_HOST)"
        - name: DB_PORT
          value: "5432"
        - name: DB_SSL_MODE
          value: "$(AI_DB_SSL)"
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: bdc-secrets
              key: LMS_POSTGRES_USER
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: bdc-secrets
              key: LMS_POSTGRES_PASSWORD
        - name: DB_NAME
          valueFrom:
            secretKeyRef:
              name: bdc-secrets
              key: LMS_POSTGRES_DB
        # Redis connection variables
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: bdc-secrets
              key: REDIS_PASSWORD
        - name: REDIS_DB
          value: "0"
        # MinIO/R2 Storage setup
        - name: MINIO_ENDPOINT
          value: "$(R2_ENDPOINT)"
        - name: MINIO_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: bdc-secrets
              key: MINIO_ROOT_USER
        - name: MINIO_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: bdc-secrets
              key: MINIO_ROOT_PASSWORD
        - name: MINIO_USE_SSL
          value: "$(MINIO_USE_SSL)"
        # Secret sync keys
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: bdc-secrets
              key: JWT_SECRET
        - name: LMS_SYNC_SECRET
          valueFrom:
            secretKeyRef:
              name: bdc-secrets
              key: LMS_SYNC_SECRET
        - name: AI_SERVICE_SECRET
          valueFrom:
            secretKeyRef:
              name: bdc-secrets
              key: AI_SERVICE_SECRET
        # CPU core count optimization for Go runtime
        - name: GOMAXPROCS
          value: "2"
        resources:
          limits:
            cpu: "2.0"
            memory: 1Gi
          requests:
            cpu: "0.5"
            memory: 256Mi
        securityContext:
          runAsUser: 1000
          runAsGroup: 1000
          runAsNonRoot: true
          allowPrivilegeEscalation: false
        volumeMounts:
        - name: uploads
          mountPath: /app/uploads
        - name: logs
          mountPath: /app/logs
        livenessProbe:
          httpGet:
            path: /health
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 15
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /health
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 15
          timeoutSeconds: 5
      volumes:
      - name: uploads
        emptyDir: {}
      - name: logs
        emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: lms-service
  labels:
    app: lms-service
spec:
  ports:
  - port: 8081
    targetPort: 8081
    protocol: TCP
  selector:
    app: lms-service
