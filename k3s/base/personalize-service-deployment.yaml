apiVersion: apps/v1
kind: Deployment
metadata:
  name: personalize-service
  labels:
    app: personalize-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: personalize-service
  template:
    metadata:
      labels:
        app: personalize-service
    spec:
      containers:
      - name: personalize-service
        image: bdc-personalize:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8082
        envFrom:
        - configMapRef:
            name: bdc-config
        env:
        - name: DATA_DIR
          value: "/app/data"
        - name: AI_SERVICE_SECRET
          valueFrom:
            secretKeyRef:
              name: bdc-secrets
              key: AI_SERVICE_SECRET
        resources:
          limits:
            cpu: "1.0"
            memory: 512Mi
          requests:
            cpu: "0.25"
            memory: 128Mi
        securityContext:
          runAsUser: 1001
          runAsGroup: 1001
          runAsNonRoot: true
          allowPrivilegeEscalation: false
        volumeMounts:
        - name: data-volume
          mountPath: /app/data
        livenessProbe:
          httpGet:
            path: /health
            port: 8082
          initialDelaySeconds: 15
          periodSeconds: 15
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /health
            port: 8082
          initialDelaySeconds: 15
          periodSeconds: 15
          timeoutSeconds: 5
      volumes:
      - name: data-volume
        emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: personalize-service
  labels:
    app: personalize-service
spec:
  ports:
  - port: 8082
    targetPort: 8082
    protocol: TCP
  selector:
    app: personalize-service
