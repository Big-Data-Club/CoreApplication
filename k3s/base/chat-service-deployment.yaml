apiVersion: apps/v1
kind: Deployment
metadata:
  name: chat-service
  labels:
    app: chat-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chat-service
  template:
    metadata:
      labels:
        app: chat-service
    spec:
      containers:
      - name: chat-service
        image: bdc-chat:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8083
        envFrom:
        - configMapRef:
            name: bdc-config
        env:
        # DB connection variables
        - name: DB_HOST
          value: "$(CHAT_POSTGRES_HOST)"
        - name: DB_PORT
          value: "5432"
        - name: DB_SSL_MODE
          value: "$(CHAT_DB_SSL_MODE)"
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: bdc-secrets
              key: CHAT_POSTGRES_USER
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: bdc-secrets
              key: CHAT_POSTGRES_PASSWORD
        - name: DB_NAME
          valueFrom:
            secretKeyRef:
              name: bdc-secrets
              key: CHAT_POSTGRES_DB
        # Redis connection variables
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: bdc-secrets
              key: REDIS_PASSWORD
        - name: REDIS_DB
          value: "3"
        # Secret sync keys
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: bdc-secrets
              key: JWT_SECRET
        - name: CHAT_SYNC_SECRET
          valueFrom:
            secretKeyRef:
              name: bdc-secrets
              key: CHAT_SYNC_SECRET
        - name: GOMAXPROCS
          value: "2"
        resources:
          limits:
            cpu: "1.0"
            memory: 512Mi
          requests:
            cpu: "0.25"
            memory: 128Mi
        securityContext:
          runAsUser: 1000
          runAsGroup: 1000
          runAsNonRoot: true
          allowPrivilegeEscalation: false
        livenessProbe:
          httpGet:
            path: /health
            port: 8083
          initialDelaySeconds: 15
          periodSeconds: 15
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /health
            port: 8083
          initialDelaySeconds: 15
          periodSeconds: 15
          timeoutSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: chat-service
  labels:
    app: chat-service
spec:
  ports:
  - port: 8083
    targetPort: 8083
    protocol: TCP
  selector:
    app: chat-service
