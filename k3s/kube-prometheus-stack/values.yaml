grafana:
  admin:
    existingSecret: grafana-admin
    userKey: admin-user
    passwordKey: admin-password

  grafana.ini:
    server:
      domain: bdc.hpcc.vn
      root_url: https://bdc.hpcc.vn/monitor/
      serve_from_sub_path: true
    security:
      cookie_secure: true
      cookie_samesite: lax

  persistence:
    enabled: true
    type: pvc
    storageClassName: local-path
    accessModes:
      - ReadWriteOnce
    size: 5Gi

  ingress:
    enabled: false

prometheus:
  prometheusSpec:
    retention: 15d

    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 10Gi

    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false

alertmanager:
  enabled: true
  alertmanagerSpec:
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 2Gi

kubeStateMetrics:
  enabled: true

# Keep this disabled during initial installation because the existing
# Node Exporter already occupies host port 9100.
nodeExporter:
  enabled: false

# These K3s control-plane components do not expose the standard endpoints
# expected by kube-prometheus-stack.
kubeControllerManager:
  enabled: false

kubeScheduler:
  enabled: false

kubeEtcd:
  enabled: false

kubeProxy:
  enabled: false
