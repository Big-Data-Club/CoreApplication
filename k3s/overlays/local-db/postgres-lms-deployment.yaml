apiVersion: v1
kind: Service
metadata:
  name: postgres-lms
  labels:
    app: postgres-lms
spec:
  ports:
  - port: 5432
    targetPort: 5432
  selector:
    app: postgres-lms

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres-lms
  labels:
    app: postgres-lms
spec:
  serviceName: postgres-lms
  replicas: 1
  selector:
    matchLabels:
      app: postgres-lms
  template:
    metadata:
      labels:
        app: postgres-lms
    spec:
      containers:
      - name: postgres-lms
        image: postgres:15-alpine
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5432
          name: postgres
        env:
        - name: POSTGRES_DB
          valueFrom:
            secretKeyRef:
              name: bdc-secrets
              key: LMS_POSTGRES_DB
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: bdc-secrets
              key: LMS_POSTGRES_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: bdc-secrets
              key: LMS_POSTGRES_PASSWORD
        - name: POSTGRES_INITDB_ARGS
          value: "-E UTF8 --locale=en_US.UTF-8"
        resources:
          limits:
            cpu: "1.0"
            memory: 512Mi
          requests:
            cpu: "0.25"
            memory: 256Mi
        volumeMounts:
        - name: pg-data
          mountPath: /var/lib/postgresql/data
        livenessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - "$(POSTGRES_USER)"
            - -d
            - "$(POSTGRES_DB)"
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - "$(POSTGRES_USER)"
            - -d
            - "$(POSTGRES_DB)"
          initialDelaySeconds: 15
          periodSeconds: 10
  volumeClaimTemplates:
  - metadata:
      name: pg-data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 10Gi
