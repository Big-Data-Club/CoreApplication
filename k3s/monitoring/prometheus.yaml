apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: default
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']

      - job_name: 'node-exporter'
        static_configs:
          - targets: ['node-exporter-service:9100']

      # Scrapes auth-service JVM actuator metrics
      - job_name: 'auth-service'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['auth-service:8080']

      # Scrapes other microservices if they expose /metrics (Go services LMS, Lab, Chat)
      - job_name: 'lms-service'
        metrics_path: '/metrics'
        static_configs:
          - targets: ['lms-service:8081']

      - job_name: 'lab-service'
        metrics_path: '/metrics'
        static_configs:
          - targets: ['lab-service:8082']

      - job_name: 'chat-service'
        metrics_path: '/metrics'
        static_configs:
          - targets: ['chat-service:8083']

      - job_name: 'ai-service'
        metrics_path: '/metrics'
        static_configs:
          - targets: ['ai-service:8000']

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: default
  labels:
    app: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
      - name: prometheus
        image: prom/prometheus:v2.52.0
        imagePullPolicy: IfNotPresent
        args:
        - "--config.file=/etc/prometheus/prometheus.yml"
        - "--storage.tsdb.path=/prometheus"
        - "--web.enable-lifecycle"
        ports:
        - containerPort: 9090
          name: http
        resources:
          limits:
            cpu: "1.0"
            memory: 1Gi
          requests:
            cpu: "0.25"
            memory: 256Mi
        volumeMounts:
        - name: prometheus-config
          mountPath: /etc/prometheus
        - name: prometheus-storage
          mountPath: /prometheus
      volumes:
      - name: prometheus-config
        configMap:
          name: prometheus-config
      - name: prometheus-storage
        emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: prometheus-service
  namespace: default
  labels:
    app: prometheus
spec:
  ports:
  - port: 9090
    targetPort: 9090
    name: http
  selector:
    app: prometheus
