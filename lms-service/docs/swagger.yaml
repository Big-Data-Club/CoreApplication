  dto.StudentAnswerForGrading:
    properties:
      answer_data:
        additionalProperties: true
        type: object
      answered_at:
        type: string
      attempt_id:
        type: integer
      feedback:
        type: string
      id:
        type: integer
      points:
        type: number
      points_earned:
        type: number
      question_id:
        type: integer
      question_images:
        items:
          $ref: '#/definitions/dto.QuestionImage'
        type: array
      question_text:
        type: string
      question_type:
        type: string
      student_email:
        type: string
      student_id:
        type: integer
      student_name:
        type: string
