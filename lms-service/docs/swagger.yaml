  dto.StudentAnswerResponse:
    properties:
      answer_data:
        additionalProperties: true
        type: object
      answered_at:
        type: string
      attempt_id:
        type: integer
      graded_at:
        type: string
      graded_by:
        type: integer
      grader_feedback:
        type: string
      id:
        type: integer
      is_correct:
        type: boolean
      points_earned:
        type: number
      question_id:
        type: integer
      time_spent_seconds:
        type: integer
    type: object
  dto.StudentEnrollmentResponse:
    properties:
      accepted_at:
        type: string
      course_id:
        type: integer
      course_title:
        type: string
      enrolled_at:
        type: string
      id:
        type: integer
      progress_percent:
        type: number
      status:
        type: string
      teacher_name:
        type: string
