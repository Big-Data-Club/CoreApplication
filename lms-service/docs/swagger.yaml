      org_id:
        type: integer
      thumbnail_url:
        maxLength: 500
        type: string
      title:
        maxLength: 255
        minLength: 3
        type: string
      visibility:
        enum:
        - PUBLIC
        - ORG_ONLY
        type: string
    type: object
  dto.UpdateForumCommentRequest:
    properties:
      body:
        minLength: 1
        type: string
    type: object
  dto.UpdateForumPostRequest:
    properties:
      body:
        minLength: 10
        type: string
      tags:
        items:
          type: string
        maxItems: 5
        type: array
      title:
        maxLength: 255
        minLength: 5
        type: string
    type: object
  dto.UpdateMemberRoleRequest:
    properties:
      org_role:
        enum:
        - OWNER
        - ADMIN
        - MEMBER
