        $ref: '#/definitions/dto.OrgSettingsDTO'
      slug:
        maxLength: 100
        minLength: 2
        type: string
    type: object
  dto.UpdateQuestionRequest:
    properties:
      explanation:
        type: string
      is_required:
        type: boolean
      order_index:
        type: integer
      points:
        type: number
      question_html:
        type: string
      question_text:
        type: string
      settings:
        additionalProperties: true
        type: object
    type: object
  dto.UpdateQuizRequest:
    properties:
      allow_review:
        type: boolean
      auto_grade:
        type: boolean
      available_from:
        type: string
      available_until:
        type: string
      description:
        type: string
      instructions:
        type: string
      is_published:
        type: boolean
      max_attempts:
        type: integer
      passing_score:
        type: number
      show_correct_answers:
        type: boolean
      show_feedback:
        type: boolean
      show_results_immediately:
        type: boolean
      shuffle_answers:
        type: boolean
      shuffle_questions:
        type: boolean
      time_limit_minutes:
        type: integer
      title:
        maxLength: 500
        minLength: 3
        type: string
      total_points:
        type: number
    type: object
  dto.UpdateSectionRequest:
    properties:
      description:
        maxLength: 2000
        type: string
      is_published:
        type: boolean
      order_index:
        minimum: 0
        type: integer
      title:
        maxLength: 255
        minLength: 3
        type: string
    type: object
  dto.UserRolesResponse:
    properties:
      email:
        type: string
      roles:
        items:
          type: string
        type: array
      user_id:
        type: integer
    type: object
  dto.UserSearchResponse:
    properties:
      email:
        type: string
      full_name:
        type: string
      id:
        type: integer
    type: object
  dto.UserSyncRequest:
    properties:
      email:
        type: string
      full_name:
        type: string
      org:
        type: string
      roles:
        items:
          type: string
        minItems: 1
        type: array
      user_id:
        type: integer
    required:
    - email
    - full_name
    - roles
    - user_id
    type: object
  dto.UserSyncResponse:
    properties:
      email:
        type: string
      is_new:
        type: boolean
      roles_assigned:
        items:
          type: string
        type: array
      user_id:
        type: integer
    type: object
  dto.VoteRequest:
    properties:
      vote_type:
        enum:
        - upvote
        - downvote
        type: string
    required:
    - vote_type
    type: object
  dto.VoteResponse:
    properties:
      downvotes:
        type: integer
      new_score:
        type: integer
      success:
        type: boolean
      upvotes:
        type: integer
      vote_type:
        type: string
    type: object
  handler.FileUploadResponse:
    properties:
      file_id:
        type: string
      file_name:
        type: string
      file_path:
        type: string
      file_size:
        type: integer
      file_type:
        type: string
      file_url:
        type: string
    type: object
host: localhost:3000
info:
  contact:
    email: support@bdc.hpcc.vn
    name: API Support
    url: https://bdc.hpcc.vn/support
  description: This is the API documentation for LMS (Learning Management System)
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: https://bdc.hpcc.vn/terms
  title: LMS API Documentation
  version: "1.0"
paths:
  /admin/organizations:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.ListResponse'
      security:
      - BearerAuth: []
      summary: List organizations
      tags:
      - organizations
    post:
      consumes:
      - application/json
      parameters:
      - description: Organization data
        in: body
        name: org
        required: true
        schema:
          $ref: '#/definitions/dto.CreateOrgRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.OrgResponse'
      security:
      - BearerAuth: []
      summary: Create organization
      tags:
      - organizations
  /admin/organizations/{id}:
    delete:
      parameters:
      - description: Organization ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.MessageResponse'
      security:
      - BearerAuth: []
      summary: Deactivate organization
      tags:
      - organizations
    get:
      parameters:
      - description: Organization ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.OrgResponse'
      security:
      - BearerAuth: []
      summary: Get organization
      tags:
      - organizations
    put:
      consumes:
      - application/json
      parameters:
      - description: Organization ID
        in: path
        name: id
        required: true
        type: integer
      - description: Update data
        in: body
        name: org
        required: true
        schema:
          $ref: '#/definitions/dto.UpdateOrgRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.OrgResponse'
      security:
      - BearerAuth: []
      summary: Update organization
      tags:
      - organizations
  /admin/organizations/{id}/members:
    get:
      parameters:
      - description: Organization ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.ListResponse'
      security:
      - BearerAuth: []
      summary: List org members
      tags:
      - organizations
    post:
      consumes:
      - application/json
      parameters:
      - description: Organization ID
        in: path
        name: id
        required: true
        type: integer
      - description: Member data
        in: body
        name: member
        required: true
        schema:
          $ref: '#/definitions/dto.AddMemberRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.MessageResponse'
      security:
      - BearerAuth: []
      summary: Add org member
      tags:
      - organizations
  /admin/organizations/{id}/members/{userId}:
    delete:
      parameters:
      - description: Organization ID
        in: path
        name: id
        required: true
        type: integer
      - description: User ID
        in: path
        name: userId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.MessageResponse'
      security:
      - BearerAuth: []
      summary: Remove org member
      tags:
      - organizations
  /admin/organizations/{id}/members/{userId}/role:
    put:
      consumes:
      - application/json
      parameters:
      - description: Organization ID
        in: path
        name: id
        required: true
        type: integer
      - description: User ID
        in: path
        name: userId
        required: true
        type: integer
      - description: New role
        in: body
        name: role
        required: true
        schema:
          $ref: '#/definitions/dto.UpdateMemberRoleRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.MessageResponse'
      security:
      - BearerAuth: []
      summary: Update member role
      tags:
      - organizations
  /admin/organizations/{id}/members/bulk:
    post:
      consumes:
      - application/json
      parameters:
      - description: Organization ID
        in: path
        name: id
        required: true
        type: integer
      - description: Bulk add request data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.BulkAddMembersRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.BulkAddMembersResponse'
      security:
      - BearerAuth: []
      summary: Bulk add org members
      tags:
      - organizations
  /admin/organizations/{id}/stats:
    get:
      parameters:
      - description: Organization ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.OrgStatsResponse'
      security:
      - BearerAuth: []
      summary: Get organization stats
      tags:
      - organizations
  /ai/concept-check:
    post:
      consumes:
      - application/json
      description: Generates 1–2 ultra-short MCQ questions for the Quick
      produces:
      - application/json
      responses: {}
      security:
      - BearerAuth: []
      summary: Quick Action Panel — Concept Check
      tags:
      - AI - Quick Action Panel
  /ai/jobs/{jobId}/status:
    get:
      parameters:
      - description: Job ID
        in: path
        name: jobId
        required: true
        type: string
      produces:
      - application/json
      responses: {}
      security:
      - BearerAuth: []
      summary: Get AI Job Status
      tags:
      - AI - Core
  /ai/knowledge-graph/global:
    get:
      description: Returns the entire knowledge graph across all courses.
      parameters:
      - description: Minimum edge strength (0.0 to 1.0)
        format: float64
        in: query
        name: min_strength
        type: number
      - description: Limit number of nodes
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses: {}
      security:
      - BearerAuth: []
      summary: Get global knowledge graph
      tags:
      - AI - Knowledge Graph
  /ai/knowledge-graph/link-global:
    post:
      description: Triggers a background task to find and create cross-course knowledge
        relationships.
      produces:
      - application/json
      responses: {}
      security:
      - BearerAuth: []
      summary: Trigger Global Knowledge Linking
      tags:
      - AI - Knowledge Graph
  /ai/quiz-drafts/{genId}/approve:
    post:
      consumes:
      - application/json
      description: Instructor approves a DRAFT question -> published to a quiz.
      parameters:
      - description: Generation ID
        in: path
        name: genId
        required: true
        type: integer
      produces:
      - application/json
      responses: {}
      security:
      - BearerAuth: []
      summary: Approve AI-Generated Question
      tags:
      - AI - Phase 2
  /ai/quiz-drafts/{genId}/reject:
    post:
      consumes:
      - application/json
      parameters:
      - description: Generation ID
        in: path
        name: genId
        required: true
        type: integer
      produces:
      - application/json
      responses: {}
      security:
      - BearerAuth: []
      summary: Reject AI-Generated Question
      tags:
      - AI - Phase 2
  /analytics/heatmap:
    get:
      parameters:
      - description: Course ID
        in: query
        name: course_id
        required: true
        type: integer
      produces:
      - application/json
      responses: {}
      security:
      - BearerAuth: []
      summary: Get the composite mastery heatmap for a course (teacher view)
      tags:
      - Analytics
  /analytics/heatmap/me:
    get:
      parameters:
      - description: Course ID
        in: query
        name: course_id
        required: true
        type: integer
      produces:
      - application/json
      responses: {}
      security:
      - BearerAuth: []
      summary: Get the composite mastery heatmap for the current student
      tags:
      - Analytics
  /analytics/micro-interaction:
    post:
      consumes:
      - application/json
      produces:
      - application/json
      responses: {}
      security:
      - BearerAuth: []
      summary: Record a Quick Action Panel micro-interaction
      tags:
      - Analytics
  /answers/{answerId}/grade:
    post:
      consumes:
      - application/json
      description: Manually grade a student's answer (teacher/admin only)
      parameters:
      - description: Answer ID
        in: path
        name: answerId
        required: true
        type: integer
      - description: Grade data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.GradeAnswerRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Answer graded successfully
          schema:
            allOf:
            - $ref: '#/definitions/dto.SuccessResponse'
            - properties:
                message:
                  type: string
              type: object
        "400":
          description: Invalid request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "403":
          description: Forbidden - teacher/admin only
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Grade an answer
      tags:
      - Quiz - Teacher
  /attempts/{attemptId}/answers:
    get:
      consumes:
      - application/json
      description: Get all answers for a specific quiz attempt
      parameters:
      - description: Attempt ID
        in: path
        name: attemptId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: List of student answers
          schema:
            allOf:
            - $ref: '#/definitions/dto.SuccessResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/dto.QuizStudentAnswerDTO'
                  type: array
              type: object
        "400":
          description: Invalid attempt ID
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "403":
          description: Forbidden - not authorized to view this attempt
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Attempt not found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get attempt answers
      tags:
      - Quiz - Student
    post:
      consumes:
      - application/json
      description: Submit an answer for a question in an active quiz attempt
      parameters:
      - description: Attempt ID
        in: path
        name: attemptId
        required: true
        type: integer
      - description: Answer data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.SubmitAnswerRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Answer submitted successfully
          schema:
            allOf:
            - $ref: '#/definitions/dto.SuccessResponse'
            - properties:
                data:
                  $ref: '#/definitions/dto.StudentAnswerResponse'
              type: object
        "400":
          description: Invalid request or quiz already submitted
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Submit an answer
      tags:
      - Quiz - Student
  /attempts/{attemptId}/questions/{questionId}/diagnose:
    post:
      description: Analyze why a student answered incorrectly, with deep link to source
        material.
      parameters:
      - description: Quiz Attempt ID
        in: path
        name: attemptId
        required: true
        type: integer
      - description: Question ID
        in: path
        name: questionId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/ai.DiagnoseResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: AI Error Diagnosis
      tags:
      - AI - Phase 1
  /attempts/{attemptId}/result:
    get:
      consumes:
      - application/json
      description: Get the result of a submitted quiz attempt
      parameters:
      - description: Attempt ID
        in: path
        name: attemptId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Quiz result
          schema:
            allOf:
            - $ref: '#/definitions/dto.SuccessResponse'
            - properties:
                data:
                  $ref: '#/definitions/dto.QuizResultResponse'
              type: object
        "400":
          description: Invalid attempt ID or quiz not submitted
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "403":
          description: Forbidden - not your attempt
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get quiz result
      tags:
      - Quiz - Student
  /attempts/{attemptId}/review:
    get:
      consumes:
      - application/json
      description: Review a completed quiz attempt with correct answers (if allowed
        by quiz settings)
      parameters:
      - description: Attempt ID
        in: path
        name: attemptId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Quiz review with correct answers
          schema:
            allOf:
            - $ref: '#/definitions/dto.SuccessResponse'
            - properties:
                data:
                  $ref: '#/definitions/dto.QuizReviewResponse'
              type: object
        "400":
          description: Invalid attempt ID or review not allowed
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "403":
          description: Forbidden - not your attempt
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Review quiz
      tags:
      - Quiz - Student
  /attempts/{attemptId}/submit:
    post:
      consumes:
      - application/json
