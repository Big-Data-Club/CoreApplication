        type: string
      is_mandatory:
        type: boolean
      is_published:
        type: boolean
      metadata:
        additionalProperties: true
        type: object
      order_index:
        minimum: 0
        type: integer
      title:
        maxLength: 255
        minLength: 3
        type: string
    type: object
  dto.UpdateCourseRequest:
    properties:
      category:
        maxLength: 100
        type: string
      description:
        maxLength: 5000
        type: string
      level:
        enum:
        - BEGINNER
        - INTERMEDIATE
        - ADVANCED
        - ALL_LEVELS
