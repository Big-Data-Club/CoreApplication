  dto.SubmitAnswerRequest:
    properties:
      answer_data:
        additionalProperties: true
        type: object
      attempt_id:
        type: integer
      question_id:
        type: integer
    required:
    - answer_data
    - attempt_id
    - question_id
    type: object
  dto.SuccessResponse:
    properties:
      data: {}
